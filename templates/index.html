<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Beau+Rivage&family=Playwrite+DE+SAS:wght@100..400&family=Satisfy&display=swap');
        body{
            background-color: black;
            scrollbar-width: none;
        }
        .text-white{
            color: white;
        }
        .text-white2{
            color: rgb(187, 185, 185);
        }
        .navbar{
            background-color: rgba(0, 140, 255, 0.721); 
            padding: 20px; 
            position: sticky;
            top: 0; 
            z-index: 100
        }
        .nav_items{
            color: black; 
            text-decoration: none; 
            margin-left: 20px;
            font-weight: bold;
        }
        .nav_items:hover{
            color: white;
        }
        .navbar-brand{
            color: black; 
            text-decoration: none;
            font-size: xx-large; 
            font-weight: bolder;
            font-family: "Playwrite DE SAS", cursive;
            font-optical-sizing: auto;
            font-style: normal;
        }
        .card{
            margin-top:30px; 
            background-color:black;
            transition: transform 0.3s ease;
        }
        .card:hover{
            transform: scale(1.1);
            background-color: rgb(57, 56, 56);
        }
        .book-name{
            margin-top: 10px; 
            font-size: x-large;
            font-family: "Playwrite DE SAS", cursive;
            font-optical-sizing: auto;
            font-style: normal;
        }
        .active{
            color: white;
        }
        .container{
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a class="navbar-brand">NLP-Powered Semantic Book Discovery Engine</a>
        <div style="display: flex; font-size: large;">
            <span><a href="/recommend" class="nav_items">AI Recommend</a></span>
            <span><a href="/" class="nav_items active">Most Popular</a></span>
            <span><a href="https://github.com/ayushkas3ra/book-recommender" target="_blank"  class="nav_items">Source Code</a></span>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            <div class="col-md-12" style="margin-top:30px">
                <h1 class="text-white" style="font-size:xx-large">Most Popular Books</h1>
            </div>
            {%for i in range(books_names|length)%}
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <img src="{{ images[i] }}" alt="thumbnail" class="card-img-top">
                        <div class="description" style="margin: 5px">
                        <p class="text-white book-name" >{{ books_names[i] }}</p>
                        <p class="text-white2">{{ genres[i] }}</p>
                        <p class="text-white2">{{ authors[i] }}</p>
                        <p class="text-white2">Rating: {{ ratings[i] }} ({{ votes[i] }} votes)</p>
                        </div>
                        
                    </div>
                </div>
            </div>
            {%endfor%}
            </div>
        </div>
    </div>
</body>
</html>
