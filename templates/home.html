<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBDB:Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body{
            background-color: black;
            scrollbar-width: none;
        }
        .text-white{
            color: white;
        }
        .text-white2{
            color: rgb(187, 185, 185);
        }
        .navbar{
            background-color: rgb(49, 49, 49); 
            position: sticky;
            top: 0; 
            z-index: 100;
            display: flex;
            justify-content: space-between;
            padding-right: 10px;
            padding-left: 10px;
            align-items: center;
        }
        .nav_items{
            color: rgb(255, 255, 255); 
            text-decoration: none; 
            font-weight: bold;
        }
        .text-box {
            border: 1px solid #000000; 
            padding: 2px; 
            padding-left: 5px;
            padding-right: 5px;            
            display: inline-block;
            background-color: yellow;
            border-radius: 5px;     
        }
        .nav_items:hover{
            text-decoration: underline;
        }
        .navbar-brand{
            color: black; 
            text-decoration: none;
            font-size: large; 
            font-weight: bolder;
            font-optical-sizing: auto;
            font-style: normal;
            padding-left: 10px;
        }
        .link-box{
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            max-width: 30vw;
            margin-left: 10px;
            margin-right: 10px;
        }
        .card{
            margin-top:30px; 
            background-color:black;
            transition: transform 0.3s ease;
        }
        .card:hover{
            transform: scale(1.05);
            background-color: rgb(57, 56, 56);
        }
        .book-name{
            margin-top: 10px; 
            font-size: x-large;
            font-optical-sizing: auto;
            font-style: normal;
        }
        .search-form {
            display: flex;
            gap: 5px; 
            flex-grow: 1; 
            margin-left: 10px;
            margin-right: 10px;
        }
        .search-form input {
            padding: 6px 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px; 
            outline: none;
            flex-grow: 1;
        }
        .search-form button {
            padding: 6px 12px;
            background-color: yellow;
            color: rgb(0, 0, 0);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .search-form button {
            background-color: yellow;
        }
        .search-form button:hover{
            background-color: rgb(176, 176, 1);
        }
        #loading-overlay {
            transition: opacity 0.5s ease; /* Makes the spinner fade out smoothly */
        }
    </style>
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body>
    <!-- LOADING OVERLAY START -->
    <div id="loading-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: black; display: flex; justify-content: center; align-items: center; z-index: 9999;">
        <div class="text-center">
            <div class="spinner-border text-warning" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="text-white mt-3" style="font-family: 'Playwrite DE SAS', cursive;">Finding your books...</p>
        </div>
    </div>
    <!-- LOADING OVERLAY END -->

    <nav class="navbar">
        <a class="navbar-brand"><div class="text-box">IBDB</div></a>
        <form class="search-form" action="/recommend_books" method="POST">
            <input placeholder="Search..." aria-label="Search" name="user_input" type="text" class="form-control"> 
            <button type="submit">Go</button>
        </form>
        <div class="link-box">
            <span><a href="/signin" class="nav_items active">Sign in</a></span>
            <span><a href="https://github.com/ayushkas3ra/book-recommender" target="_blank"  class="nav_items">Source Code</a></span>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            <div class="col-md-12" style="margin-top:30px">
                <h1 class="text-white" style="font-size:xx-large">Most Popular Books</h1>
            </div>
            {%for i in range(books_names|length)%}
            <div class="col-md-3">
                <a href="/book/{{ids[i]}}">
                    <div class="card">
                    <div class="card-body">
                        <img loading="lazy" src="{{ images[i] }}" alt="thumbnail" class="card-img-top">
                        <div class="description" style="margin: 5px">
                        <p class="text-white book-name" >{{ books_names[i] }}</p>
                        <p class="text-white2">{{ genres[i] }}</p>
                        <p class="text-white2">{{ authors[i] }}</p>
                        <p class="text-white2">Rating: {{ ratings[i] }} ({{ votes[i] }} votes)</p>
                        </div>
                    </div>
                </div>
                </a>
            </div>
            {%endfor%}
            </div>
        </div>
    </div>
    <script>
        window.addEventListener('load', function() {
            const overlay = document.getElementById('loading-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
            },500);
        });
    </script>
</body>
</html>
