<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>IBDB:Sign-in</title>
    <style>
      body {
        background-color: black;
        color: white;
      }
      .navbar {
        background-color: rgb(49, 49, 49);
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        justify-content: space-between;
        padding-right: 10px;
        padding-left: 10px;
        align-items: center;
      }
      .nav_items {
        color: rgb(255, 255, 255);
        text-decoration: none;
        font-weight: bold;
      }
      .text-box {
        border: 1px solid #000000;
        padding: 2px;
        padding-left: 5px;
        padding-right: 5px;
        display: inline-block;
        background-color: yellow;
        border-radius: 5px;
      }
      .nav_items:hover {
        text-decoration: underline;
      }
      .navbar-brand {
        color: black;
        text-decoration: none;
        font-size: large;
        font-weight: bolder;
        font-optical-sizing: auto;
        font-style: normal;
        padding-left: 10px;
      }
      .link-box {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        max-width: 30vw;
        margin-left: 10px;
        margin-right: 10px;
      }
      .search-form {
        display: flex;
        gap: 5px;
        flex-grow: 1;
        margin-left: 10px;
        margin-right: 10px;
      }
      .search-form input {
        padding: 6px 12px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 4px;
        outline: none;
        flex-grow: 1;
      }
      .search-form button {
        padding: 6px 12px;
        background-color: yellow;
        color: rgb(0, 0, 0);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      .search-form button {
        background-color: yellow;
      }
      .search-form button:hover {
        background-color: rgb(176, 176, 1);
      }
      .container {
        height: 80vh;
        width: 100vw;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }
      .back-button {
        background-color: gray;
        border: 2px solid black;
        border-radius: 10px;
        padding: 5px;
        padding-left: 10px;
        padding-right: 10px;
        margin-top: 10px;
      }
      .back-button > a {
        text-decoration: none;
        color: black;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a href="/" class="navbar-brand"><div class="text-box">IBDB</div></a>
      <form class="search-form" action="/recommend_books" method="POST">
        <input
          placeholder="Search..."
          aria-label="Search"
          name="user_input"
          type="text"
          class="form-control"
        />
        <button type="submit">Go</button>
      </form>
      <div class="link-box">
        <span><a href="/signin" class="nav_items active">Sign in</a></span>
        <span
          ><a
            href="https://github.com/ayushkas3ra/book-recommender"
            target="_blank"
            class="nav_items"
            >Source Code</a
          ></span
        >
      </div>
    </nav>
    <div class="container">
      <h1>Coming Soon...</h1>
      <button class="back-button"><a href="/">BACK</a></button>
    </div>
  </body>
</html>
