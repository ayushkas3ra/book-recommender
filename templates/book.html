<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IBDB:Book info</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      body {
        background-color: black;
        color: white;
      }
      .navbar {
        background-color: rgb(49, 49, 49);
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        justify-content: space-between;
        padding-right: 10px;
        padding-left: 10px;
        align-items: center;
      }
      .nav_items {
        color: rgb(255, 255, 255);
        text-decoration: none;
        font-weight: bold;
      }
      .text-box {
        border: 1px solid #000000;
        padding: 2px;
        padding-left: 5px;
        padding-right: 5px;
        display: inline-block;
        background-color: yellow;
        border-radius: 5px;
      }
      .nav_items:hover {
        text-decoration: underline;
      }
      .navbar-brand {
        color: black;
        text-decoration: none;
        font-size: large;
        font-weight: bolder;
        font-optical-sizing: auto;
        font-style: normal;
        padding-left: 10px;
      }
      .link-box {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        max-width: 30vw;
        margin-left: 10px;
        margin-right: 10px;
      }
      .search-form {
        display: flex;
        gap: 5px;
        flex-grow: 1;
        margin-left: 10px;
        margin-right: 10px;
      }
      .search-form input {
        padding: 6px 12px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 4px;
        outline: none;
        flex-grow: 1;
      }
      .search-form button {
        padding: 6px 12px;
        background-color: yellow;
        color: rgb(0, 0, 0);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      .search-form button {
        background-color: yellow;
      }
      .search-form button:hover {
        background-color: rgb(176, 176, 1);
      }
      .box {
        display: flex;
        align-items: center;
        justify-content: flex-start;
      }
      .card {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        flex-direction: column;
        background-color: black;
        color: white;
        margin: 10px;
        max-width: 50vw;
        border: 2px solidw white;
      }
      .hidden {
        display: none;
      }
      .title-card {
        margin: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 90vw;
      }
      .container {
        display: flex;
        align-items: start;
        justify-content: start;
        width: 100vw;
      }
      .container > img {
        height: 200px;
        width: 150px;
      }
      .container2 {
        display: flex;
        align-items: start;
        justify-content: center;
        flex-direction: column;
        gap: 5px;
        margin: 5px;
      }
      .back-button {
        background-color: gray;
        border: 2px solid black;
        border-radius: 10px;
        padding: 5px;
        padding-left: 10px;
        padding-right: 10px;
        margin-top: 10px;
      }
      .back-button:hover {
        background-color: rgb(152, 150, 150);
      }
      .back-button > a {
        text-decoration: none;
        color: black;
        font-weight: bold;
      }
      .ai-card {
        height: 80vh;
        width: 30vw;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        border: 2px solid white;
        position: relative;
        padding: 5px;
      }
      .chat-box {
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow: scroll;
        scrollbar-width: none;
        min-height: 85%;
        width: 100%;
        background-color: rgb(48, 48, 48);
        padding: 10px;
      }
      .message-row {
        display: flex;
        width: 100%;
      }

      /* Align receiver to the left */
      .message-row.receiver {
        justify-content: flex-start;
      }

      /* Align sender to the right */
      .message-row.sender {
        justify-content: flex-end;
      }
      .message-bubble {
        max-width: 70%;
        padding: 5px;
        border-radius: 16px;
        font-family: sans-serif;
        border: 2px solid white;
        background-color: rgb(54, 53, 53);
      }
      .ai-card > form {
        position: absolute;
        bottom: 10px;
        border-radius: 10px;
      }
      .ai_input {
        border-radius: 20px;
        width: 70%;
        background-color: white;
        color: black;
      }
      .send-btn {
        background-color: blue;
        color: white;
        font-weight: bold;
        outline: none;
        border-radius: 10px;
        padding-left: 5px;
        padding-right: 5px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a href="/" class="navbar-brand"><div class="text-box">IBDB</div></a>
      <form class="search-form" action="/recommend_books" method="POST">
        <input
          placeholder="Search..."
          aria-label="Search"
          name="user_input"
          type="text"
          class="form-control"
        />
        <button type="submit">Go</button>
      </form>
      <div class="link-box">
        <span><a href="/signin" class="nav_items active">Sign in</a></span>
        <span
          ><a
            href="https://github.com/ayushkas3ra/book-recommender"
            target="_blank"
            class="nav_items"
            >Source Code</a
          ></span
        >
      </div>
    </nav>
    <div class="box">
      <div class="card">
        <div class="title-card">
          <h1>{{book.title}}</h1>
          <button class="back-button"><a href="/">BACK</a></button>
        </div>
        <div class="container">
          <img loading="lazy" src="{{book.thumbnail}}" alt="thumbnail" />
          <div class="container2">
            <div>Author: {{book.author}}</div>
            <div>Category: {{book.category}}</div>
            <div>Rating: ⭐ {{book.average_rating}}/5</div>
            <div>Rating Count: {{book.ratings_count}}</div>
            <div class="hidden">{{book.description}}</div>
            <div id="book-id" class="hidden">{{book.id}}</div>
          </div>
        </div>
      </div>
      <div class="ai-card">
        <div class="chat-box">
          <div class="message-row receiver">
            <div class="message-bubble">
              🤖: Hello! Welcome to IBDB, How can I help you today?
            </div>
          </div>
        </div>
        <div class="ai-card2">
          <form class="chat-form">
            <input class="ai_input" type="text" />
            <button class="send-btn" type="submit">Send</button>
          </form>
        </div>
      </div>
    </div>
    <script>
      const chatForm = document.querySelector(".chat-form");
      const questionInput = document.querySelector(".ai_input");
      const bookIdInput = document.querySelector("#book-id");
      const chatBox = document.querySelector(".chat-box");

      chatForm.addEventListener("submit", function (event) {
        event.preventDefault();

        const userQuestion = questionInput.value;
        const currentBookId = bookIdInput.textContent;

        if (userQuestion.trim() == "") {
          return;
        }
        questionInput.value = "";
        const userMessageHtml = `
        <div class="message-row sender">
          <div class="message-bubble">👤${userQuestion}</div>
          </div>
        `;
        chatBox.insertAdjacentHTML("beforeend", userMessageHtml);

        // thinking... message
        const thinkingHtml = `<div id="thinking-msg" style="text-align: left; margin-bottom: 10px;">
                                    <span style="background-color: #333; color: #ccc; padding: 8px; border-radius: 10px; font-style: italic;">
                                        Thinking...
                                    </span>
                              </div>`;
        chatBox.insertAdjacentHTML("beforeend", thinkingHtml);
        chatBox.scrollTop = chatBox.scrollHeight;

        fetch("/ask", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            question: userQuestion,
            bookId: currentBookId,
          }),
        })
          .then((response) => {
            if (!response.ok) {
              throw new Error("Network response was not ok");
            }
            return response.json();
          })
          .then((data) => {
            const thinkingMsg = document.querySelector("#thinking-msg");
            if (thinkingMsg) {
              thinkingMsg.remove();
            }
            const aiMessageHtml = `<div class="message-row receiver">
            <div class="message-bubble">
              🤖: ${data.answer}
            </div>
          </div>`;
            chatBox.insertAdjacentHTML("beforeend", aiMessageHtml);
            chatBox.scrollTop = chatBox.scrollHeight;
          })
          .catch((error) => {
            const thinkingMsg = document.querySelector("#thinking-msg");
            if (thinkingMsg) {
              thinkingMsg.remove();
            }
            console.error("Error during fetch", error);
            const errorMessageHtml = `<div class="message-row receiver">
            <div class="message-bubble">
              Sorry an Error occured while contacting the AI...
            </div>
          </div>`;
            chatBox.insertAdjacentHTML("beforeend", errorMessageHtml);
          });
      });
    </script>
  </body>
</html>
